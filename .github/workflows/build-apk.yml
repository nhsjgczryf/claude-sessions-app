name: Build Android APK

# Builds a sideload-ready debug APK on every push to main and on tag
# creation. Tagged builds also upload the APK to a GitHub Release so
# users can download it directly. The APK is a Capacitor shell — it
# asks for your VPS URL on first launch and just hosts a WebView from
# then on. The actual server (PTYs, SSH, sessions) runs on your VPS.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach the APK to a release on tagged builds

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # No `cache: npm` — we don't commit package-lock.json (deps
          # are mostly Capacitor-only and change rarely), and missing
          # lockfile makes setup-node error on cache restore.

      - name: Set up JDK 21
        # Capacitor 7's capacitor-android library targets Java 21
        # (sourceCompatibility = VERSION_21). Anything < 21 dies during
        # compileDebugJavaWithJavac with "invalid source release: 21".
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        # Pre-install NDK + CMake so gradle doesn't have to download
        # them mid-build (the externalNativeBuild block for the JNI
        # PTY library needs both). ndk;26.1.10909125 matches the
        # ndkVersion we patch into app/build.gradle in android-init.js.
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Install npm deps
        # node-pty has no Android-arm64 prebuild and would try to compile
        # from source; we don't need it inside the APK because the
        # APK is a thin WebView wrapping the user's VPS. Skip optional
        # native scripts to avoid wasting CI minutes.
        run: npm install --ignore-scripts

      - name: Initialize / sync Android project
        run: npm run android:init

      - name: Set up QEMU
        # Needed by docker buildx --platform=linux/arm64 in the next
        # step so the rootfs / proot build runs inside an arm64 container
        # emulated on this x86_64 runner.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache prebuilt static proot-arm64
        # Static-linking PRoot under QEMU takes ~5-10 min and the result
        # is content-addressable on the PROOT_REF + Alpine version. Cache
        # so subsequent main pushes only pay the rootfs build cost.
        id: cache-proot
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/proot-arm64
          key: proot-arm64-v5.4.0-alpine3.20-v2

      - name: Build Alpine rootfs + PRoot (bundled Linux env)
        # Produces android/app/src/main/assets/{proot-arm64,
        # alpine-rootfs.tar.zst,rootfs-version.txt} which then get
        # packaged into the APK by gradle in the next step. End-to-end
        # ~10-15 min on a cold cache (~3-5 min when proot is cached).
        run: bash scripts/build-alpine-rootfs.sh
        env:
          PROOT_REF: v5.4.0
          ALPINE_VERSION: '3.20'

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename APK
        run: |
          mkdir -p dist
          # On main / workflow_dispatch we publish to a rolling 'latest'
          # release, so the filename should be stable (overwrites prior
          # asset of the same name). On tag builds it embeds the tag.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            NAME="claude-sessions-${GITHUB_REF_NAME//\//-}.apk"
          else
            NAME="claude-sessions-latest.apk"
          fi
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/$NAME"
          ls -lh dist/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: claude-sessions-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Compute build timestamp
        id: ts
        # softprops/action-gh-release@v2 updates an existing release's
        # body + assets but doesn't refresh `published_at`, so the
        # Releases page still shows "X hours ago" from the FIRST run.
        # Stamping the timestamp into the release name itself is the
        # simplest reliable freshness signal.
        run: echo "TS=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        # Tagged builds → versioned release named after the tag.
        # main / workflow_dispatch → rolling 'latest' pre-release that
        # gets overwritten on every successful build. Either way the
        # APK shows up under https://github.com/<owner>/<repo>/releases
        # with a stable download URL.
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Rolling main build · {0}', steps.ts.outputs.TS) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          body: ${{ !startsWith(github.ref, 'refs/tags/') && format('Built {0} from `{1}`. Overwritten on every push — for a versioned APK, use a tagged release instead.', steps.ts.outputs.TS, github.sha) || '' }}
