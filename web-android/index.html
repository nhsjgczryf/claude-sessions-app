<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e2e" />
  <title>Claude Sessions</title>

  <link rel="stylesheet" href="vendor/xterm/css/xterm.css" />
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="vendor/xterm/lib/xterm.js"></script>
  <script src="vendor/xterm/lib/addon-fit.js"></script>
  <script src="vendor/xterm/lib/addon-web-links.js"></script>
  <script src="vendor/xterm/lib/addon-unicode11.js"></script>
  <!-- File-preview renderers (vendored, offline). marked → HTML,
       DOMPurify sanitizes it (the preview shares the WebView with the
       Capacitor native bridge — unsanitized markdown would be an
       injection path to the plugins), KaTeX renders LaTeX. All optional:
       renderer.js feature-detects each and degrades to plain text. -->
  <script src="vendor/marked/marked.min.js"></script>
  <script src="vendor/dompurify/purify.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/katex/auto-render.min.js"></script>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="sidebar-title-row">
        <div class="sidebar-title">Claude Sessions</div>
        <button id="btn-collapse" class="icon-btn" title="Collapse sidebar">&#x276E;</button>
      </div>
      <div class="sidebar-actions">
        <button id="btn-new" title="New session">+ New</button>
        <button id="btn-paste-img" title="Pick image from gallery">Img</button>
      </div>
    </div>
    <div id="session-list"></div>
  </div>

  <div id="sidebar-resizer" title="Drag to resize"></div>

  <button id="btn-expand" class="icon-btn floating hidden" title="Expand sidebar">&#x276F;</button>

  <div id="main">
    <div id="tab-bar">
      <div id="tabs"></div>
    </div>
    <div id="terminal-area">
      <div id="welcome">
        <h1>Claude Sessions</h1>
        <p>Tap a session on the left to connect.</p>
        <p class="hint">All SSH connections live in this app — no server required.</p>
      </div>
    </div>
    <!-- Visible composition input bar above the keybar.
         Background: Android WebView's IME composition events
         (compositionstart/end + insertCompositionText) are routed
         by Chromium's internal content view, which our subclassed
         WebView.onCreateInputConnection does NOT see. As a result,
         Chinese (Pinyin) commits and Gboard English autocomplete
         commits silently drop on the floor when typing into
         xterm.js's hidden helper-textarea. A normal visible <input>
         is on a different code path that WebView handles correctly;
         all text typed here streams through to the active tab's
         PTY. Hardware keyboards still go through the xterm path. -->
    <div id="mobile-input-bar" class="hidden">
      <textarea id="mobile-input" rows="1" inputmode="text"
                autocomplete="off" autocorrect="off"
                autocapitalize="off" spellcheck="false"
                enterkeyhint="send"
                placeholder="Tap to type · Enter sends · Shift+Enter 换行 · 中文/英文"></textarea>
      <button id="mobile-input-send" type="button" title="Send (Enter)">↵</button>
    </div>
    <!-- keybar = controls the PROGRAM running in the terminal above
         (claude / shell), NEVER the bottom compose box. All text input
         (中文 + English, long messages) goes through the bottom box; the
         terminal is read-only output you scroll (finger swipe) and
         select-to-copy (long-press).

         Grouped: interrupt/mode (Esc · ⇧⇥ · Tab) · navigation (↑↓←→ —
         history recall, menu nav, and moving the caret in a recalled
         line) · line-edit (⌫ backspace · Clr = Ctrl+U wipes the whole
         current line) · cancel/modifier (^C · Ctrl one-shot).
         Esc interrupts claude's current turn (double-tap = rewind);
         ^C cancels / clears input. No ⏎ (newline = the box keyboard's
         return key) and no PgUp/PgDn (scroll = swipe). Ctrl arms a
         one-shot: the next char typed in the box is sent as Ctrl+<char>
         (Ctrl+R, Ctrl+L, Ctrl+D, …). -->
    <div id="keybar" class="hidden" aria-hidden="true">
      <button type="button" data-keybar="key:Escape" title="Esc — interrupt claude (double-tap = rewind)">Esc</button>
      <button type="button" data-keybar="key:ShiftTab" title="Shift+Tab — cycle mode (plan / auto-accept)">⇧⇥</button>
      <button type="button" data-keybar="key:Tab" title="Tab — accept / complete">Tab</button>
      <button type="button" data-keybar="key:ArrowUp" title="Up — history / menu up">↑</button>
      <button type="button" data-keybar="key:ArrowDown" title="Down — history / menu down">↓</button>
      <button type="button" data-keybar="key:ArrowLeft" title="Left — move caret in the program's line">←</button>
      <button type="button" data-keybar="key:ArrowRight" title="Right — move caret in the program's line">→</button>
      <button type="button" data-keybar="key:Backspace" title="Backspace — delete a char in the program's line">⌫</button>
      <button type="button" data-keybar="ctrl:u" title="Clr — wipe the whole current line (Ctrl+U)">Clr</button>
      <button type="button" data-keybar="ctrl:c" title="Ctrl+C — cancel / interrupt">^C</button>
      <button type="button" data-keybar="mod:ctrl" title="Ctrl — one-shot: next typed char becomes Ctrl+char">Ctrl</button>
    </div>
  </div>

  <!-- Session editor modal — same shape as web/public, but with auth
       fields baked in (since the APK owns the SSH connection itself
       and needs real credentials, not just a hostname). -->
  <div id="modal-overlay" class="hidden">
    <div id="session-editor">
      <div class="editor-header">
        <span id="editor-title">New Session</span>
        <button id="editor-close" title="Close">&times;</button>
      </div>
      <form id="editor-form" autocomplete="off">
        <div class="field">
          <label>Name</label>
          <input type="text" name="name" required maxlength="80" />
        </div>

        <div class="field">
          <label>Type</label>
          <div class="radio-row">
            <label><input type="radio" name="type" value="remote" /> Remote agent (web/server.js)</label>
            <label><input type="radio" name="type" value="ssh" /> SSH (remote)</label>
            <label><input type="radio" name="type" value="local" /> Local Linux (on this phone)</label>
          </div>
        </div>

        <!-- Remote-agent fields: connect to a web/server.js running on
             your VPS over WebSocket. The agent owns a tmux-backed PTY,
             so sessions survive disconnects with no SSH/wake-lock. -->
        <div class="field remote-only">
          <label>Agent URL <span class="dim">(wss://host:port — or http(s)/host)</span></label>
          <input type="text" name="agent_url" placeholder="wss://vps.example.com:3000" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>
        <div class="field remote-only">
          <label>Agent password <span class="dim">(the web UI account password)</span></label>
          <div class="password-wrap">
            <input type="password" name="agent_password" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-for="agent_password" aria-label="Show password">&#x1F441;</button>
          </div>
        </div>

        <div class="field remote-only">
          <label>Run as <span class="dim">(Linux user on the VPS; empty = the agent's own user. Needs the agent running as root.)</span></label>
          <input type="text" name="run_as" placeholder="root" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field remote-only">
          <label>Working Dir <span class="dim">(on the VPS)</span></label>
          <div class="dir-pick-row">
            <input type="text" name="remote_working_dir" placeholder="/home/user/project" autocomplete="off" autocapitalize="none" spellcheck="false" />
            <button type="button" id="btn-browse-dir" title="Browse directories on the agent">Browse</button>
          </div>
        </div>

        <div class="field-row ssh-only">
          <div class="field grow">
            <label>Host</label>
            <input type="text" name="host" required placeholder="vps.example.com" autocomplete="off" autocapitalize="none" spellcheck="false" />
          </div>
          <div class="field shrink">
            <label>Port</label>
            <input type="number" name="port" min="1" max="65535" placeholder="22" />
          </div>
        </div>

        <div class="field ssh-only">
          <label>Username</label>
          <input type="text" name="username" placeholder="root" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field ssh-only">
          <label>Auth</label>
          <div class="radio-row">
            <label><input type="radio" name="authType" value="password" /> Password</label>
            <label><input type="radio" name="authType" value="key" /> Private key</label>
          </div>
        </div>

        <div class="field ssh-only auth-password">
          <label>Password <span class="dim">(stored on this device in plaintext — sideload only)</span></label>
          <div class="password-wrap">
            <input type="password" name="password" autocomplete="new-password" />
            <button type="button" class="password-toggle" data-for="password" aria-label="Show password">&#x1F441;</button>
          </div>
        </div>

        <div class="field ssh-only auth-key">
          <label>Private key PEM <span class="dim">(OpenSSH or PKCS8; paste contents)</span></label>
          <textarea name="privateKey" rows="4" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;..." autocomplete="off" autocapitalize="none" spellcheck="false"></textarea>
        </div>

        <div class="field ssh-only auth-key">
          <label>Private key passphrase <span class="dim">(if key is encrypted)</span></label>
          <div class="password-wrap">
            <input type="password" name="privateKeyPassphrase" autocomplete="off" />
            <button type="button" class="password-toggle" data-for="privateKeyPassphrase" aria-label="Show passphrase">&#x1F441;</button>
          </div>
        </div>

        <div class="field ssh-only">
          <label>Port Forwards <span class="dim">(one per line; <code>14500</code> or <code>local:host:remote</code>)</span></label>
          <textarea name="port_forwards" rows="2" placeholder="14500"></textarea>
        </div>

        <div class="field">
          <label class="check-row">
            <input type="checkbox" name="persistent" />
            <span>Persistent (wrap in tmux — disconnects don't kill the session)</span>
          </label>
        </div>

        <div class="field ssh-only">
          <label>Working Dir <span class="dim">(on the remote)</span></label>
          <input type="text" name="working_dir" placeholder="/home/user/projects" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field">
          <label>Pre-command <span class="dim">(runs before claude_cmd)</span></label>
          <input type="text" name="pre_command" placeholder="" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field">
          <label>Claude Cmd <span class="dim">(empty = plain shell)</span></label>
          <input type="text" name="claude_cmd" placeholder="claude" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field">
          <label>Claude Args</label>
          <input type="text" name="claude_args" autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>

        <div class="field">
          <label class="check-row">
            <input type="checkbox" name="skip_permissions" />
            <span>跳过所有权限确认 <span class="dim">(--dangerously-skip-permissions；省去逐项确认，但 claude 可不经询问地改文件/跑命令——只在你信任的环境用)</span></span>
          </label>
        </div>

        <div class="field">
          <label>Description</label>
          <input type="text" name="description" maxlength="200" autocomplete="off" />
        </div>

        <div class="editor-actions">
          <button type="button" id="editor-cancel">Cancel</button>
          <button type="submit" id="editor-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <input id="image-file-input" type="file" accept="image/*" hidden />

  <!-- Read-only file preview. Opened from the terminal selection
       toolbar (select a path → 预览). Renders markdown (+LaTeX),
       images, and plain text; read over whichever transport the active
       tab uses (SFTP / agent /api/fs/read / local rootfs). -->
  <div id="file-preview" class="hidden">
    <div class="file-preview-box">
      <div class="file-preview-header">
        <span id="file-preview-path" class="file-preview-path"></span>
        <button type="button" id="file-preview-copy" title="Copy file contents">Copy</button>
        <button type="button" id="file-preview-close" title="Close">&times;</button>
      </div>
      <div id="file-preview-banner" class="file-preview-banner hidden"></div>
      <div id="file-preview-body" class="file-preview-body"></div>
    </div>
  </div>

  <div id="context-menu" class="hidden"></div>

  <script src="ssh-bridge.js"></script>
  <script src="local-shell-bridge.js"></script>
  <script src="ws-bridge.js"></script>
  <script src="compose-input-bridge.js"></script>
  <script src="session-builder.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
